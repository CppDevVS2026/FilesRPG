# ════════════════════════════════════════════════════════
# Yokim Gold — Uncrustify Formatter Config
# ════════════════════════════════════════════════════════

# Language
input_tab_size      = 4
output_tab_size     = 4
indent_columns      = 4
indent_with_tabs    = 0       # spaces only

# Line endings
newlines            = LF

# Line length
code_width          = 100

# Braces — K&R, opening brace on same line
nl_fdef_brace       = remove   # no newline before function open brace
nl_if_brace         = remove
nl_else_brace       = remove
nl_while_brace      = remove
nl_for_brace        = remove
nl_switch_brace     = remove

# Always use braces even for single-line if/for/while
mod_full_brace_if   = add
mod_full_brace_for  = add
mod_full_brace_while = add

# Spaces
sp_before_ptr_star  = remove   # int *ptr  not  int* ptr
sp_after_ptr_star   = force
sp_before_sparen    = force    # space before ( in if/for/while
sp_inside_paren     = remove   # no space inside ( )
sp_after_comma      = force    # space after commas
sp_around_assign    = force    # space around =
sp_around_compare   = force    # space around == != < >
sp_around_bool_op   = force    # space around && ||

# Alignment — this is the Yokim Gold part
align_var_def_span          = 1    # align variable declarations
align_var_def_gap           = 1
align_assign_span            = 1   # align = signs in assignments
align_assign_gap             = 1
align_struct_init_span       = 1   # align struct initializers
align_right_cmt_span         = 2   # align trailing comments
align_func_params            = true

# Function calls
nl_func_call_args_multi_line = force   # one arg per line if multiline

# Blank lines
nl_after_func_body           = 2   # two blank lines between functions
nl_before_block_comment      = 1

# Typedefs
align_typedef_span           = 1
align_typedef_gap            = 1

# Macros
nl_define_macro              = true   # multiline macros get proper newlines